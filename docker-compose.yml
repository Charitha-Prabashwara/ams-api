services:
  ams-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ams-api
    restart: unless-stopped
    ports:
      - "${APPLICATION_PORT:-8080}:${APPLICATION_PORT:-8080}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APPLICATION_PORT: ${APPLICATION_PORT:-8080}

      # MongoDB
      DB_MONGODB_URI: ${DB_MONGODB_URI}
      DB_MONGODB_DATABASE: ${DB_MONGODB_DATABASE}

      # Auth / JWT
      SLAT_ROUNDS: ${SLAT_ROUNDS:-10}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      ACCESS_TOKEN_TTL: ${ACCESS_TOKEN_TTL:-1h}
      REFRESH_TOKEN_TTL: ${REFRESH_TOKEN_TTL:-30d}
      REFRESH_TOKEN_COOKIE_TTL: ${REFRESH_TOKEN_COOKIE_TTL:-3600}

      # CORS
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ALLOWED_METHODS: ${ALLOWED_METHODS}
      ALLOWED_HEADERS: ${ALLOWED_HEADERS}
    volumes:
      - logs:/app/logs
    networks:
      - ams-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${APPLICATION_PORT:-8080}/api/v1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  logs:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  ams-network:
    driver: bridge
